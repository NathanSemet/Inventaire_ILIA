<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ILIA — Générateur de QR Codes</title>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f4f3ef;
      --surface: #ffffff;
      --border: #e0ded8;
      --text-primary: #1a1a18;
      --text-secondary: #6b6960;
      --accent: #1d4ed8;
      --accent-light: #eff6ff;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--accent); }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-primary);
    }
    .btn-outline:hover { background: var(--bg); }
    .btn-danger { background: var(--danger); color: #fff; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 61px);
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-card h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      background: var(--bg);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); background: #fff; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* ── MAIN APP ── */
    #app-screen { display: none; }

    .app-bar {
      padding: 20px 32px 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .app-bar h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .app-bar p { font-size: 14px; color: var(--text-secondary); margin-top: 3px; }

    /* ── CONTROLS ── */
    .controls {
      padding: 16px 32px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 61px;
      z-index: 50;
    }

    .controls input[type="text"] {
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      min-width: 220px;
      outline: none;
      background: var(--bg);
    }
    .controls input[type="text"]:focus { border-color: var(--accent); background: #fff; }

    .count-badge {
      margin-left: auto;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: 'DM Mono', monospace;
    }

    /* ── GRID ── */
    #qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }

    .qr-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: box-shadow 0.2s;
    }
    .qr-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .qr-canvas-wrapper {
      background: #fff;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .qr-info { text-align: center; width: 100%; }
    .qr-model {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 3px;
      line-height: 1.3;
    }
    .qr-serial {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 4px;
      display: inline-block;
    }
    .status-disponible  { background: #dcfce7; color: #15803d; }
    .status-loue        { background: #e0e7ff; color: #4338ca; }
    .status-maintenance { background: #fef3c7; color: #b45309; }
    .status-endommage   { background: #fee2e2; color: #b91c1c; }
    .status-default     { background: #f1f5f9; color: #475569; }

    /* ── LOADING / EMPTY ── */
    #loading-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 15px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #empty-state {
      display: none;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-secondary);
    }

    /* ── PRINT ── */
    @media print {
      header, .controls, .app-bar { display: none !important; }

      body { background: #fff; }

      #qr-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 8px;
      }

      .qr-card {
        border: 1px solid #ddd;
        page-break-inside: avoid;
        break-inside: avoid;
        padding: 12px 10px 10px;
        box-shadow: none !important;
      }

      .qr-model { font-size: 11px; }
      .qr-serial { font-size: 9px; }
      .status-badge { font-size: 8px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">ILIA <span>·</span> QR Manager</div>
  <div class="header-actions">
    <button class="btn btn-outline" id="btn-print" style="display:none" onclick="window.print()">
      🖨️ Imprimer tout
    </button>
    <button class="btn btn-outline" id="btn-logout" style="display:none" onclick="logout()">
      Déconnexion
    </button>
  </div>
</header>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <h2>Accès réservé</h2>
    <p>Connectez-vous avec votre compte membre ILIA pour accéder au générateur de QR codes.</p>

    <div class="error-msg" id="login-error"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="votre@email.com" />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') handleLogin()" />
    </div>

    <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px"
            onclick="handleLogin()" id="btn-login">
      Se connecter
    </button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-screen">
  <div class="app-bar">
    <div>
      <h1>Générateur de QR Codes</h1>
      <p>Cliquez sur "Imprimer tout" pour générer la feuille d'impression.</p>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search-input" placeholder="🔍 Filtrer par nom ou numéro de série..."
           oninput="filterCards()" />
    <span class="count-badge" id="count-label">— items</span>
  </div>

  <div id="loading-state">
    <div class="spinner"></div>
    <span>Chargement des items...</span>
  </div>

  <div id="empty-state">
    <p style="font-size:18px; font-weight:600; margin-bottom:8px">Aucun item trouvé</p>
    <p style="font-size:14px">Essayez un autre terme de recherche.</p>
  </div>

  <div id="qr-grid"></div>
</div>

<!-- ── SCRIPT ── -->
<script>
  // ── CONFIG ──
  const SUPABASE_URL = 'https://vgppozxbvlkskgnbdiui.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZncHBvenhidmxrc2tnbmJkaXVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjg1ODIsImV4cCI6MjA5NDYwNDU4Mn0.LtuVrXhdw9dIIpIKnuuLtx_0LLh4U-0r0WtKalrTlMM';
  const APP_SCHEME = 'myapp://location?materielId=';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allItems = [];

  // ── LOGIN ──
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');

    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Connexion...';

    try {
      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) throw error;

      // Vérifie que c'est bien un membre ILIA
      const { data: userRow, error: userErr } = await db
        .from('users')
        .select('member_ILIA')
        .eq('email', email)
        .maybeSingle();

      if (userErr || !userRow?.member_ILIA) {
        await db.auth.signOut();
        throw new Error("Accès refusé : vous n'êtes pas membre ILIA.");
      }

      showApp();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  }

  async function logout() {
    await db.auth.signOut();
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('btn-print').style.display = 'none';
    document.getElementById('btn-logout').style.display = 'none';
    document.getElementById('qr-grid').innerHTML = '';
    allItems = [];
  }

  // ── APP ──
  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('btn-print').style.display = 'inline-flex';
    document.getElementById('btn-logout').style.display = 'inline-flex';
    loadItems();
  }

  async function loadItems() {
    const grid = document.getElementById('qr-grid');
    const loading = document.getElementById('loading-state');

    grid.style.display = 'none';
    loading.style.display = 'flex';

    const { data, error } = await db
      .from('items')
      .select('id, serial_number, status, model_materiel(nom)')
      .order('id');

    loading.style.display = 'none';

    if (error || !data) {
      grid.innerHTML = '<p style="color:red; padding:32px">Erreur lors du chargement.</p>';
      grid.style.display = 'block';
      return;
    }

    // Normalise les jointures Supabase
    allItems = data.map(item => ({
      ...item,
      model_materiel: Array.isArray(item.model_materiel)
        ? item.model_materiel[0]
        : item.model_materiel,
    }));

    renderCards(allItems);
  }

  function renderCards(items) {
    const grid = document.getElementById('qr-grid');
    const empty = document.getElementById('empty-state');
    const countLabel = document.getElementById('count-label');

    grid.innerHTML = '';

    if (items.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'block';
      countLabel.textContent = '0 items';
      return;
    }

    empty.style.display = 'none';
    grid.style.display = 'grid';
    countLabel.textContent = `${items.length} item${items.length > 1 ? 's' : ''}`;

    items.forEach(item => {
      const nom = item.model_materiel?.nom || 'Modèle inconnu';
      const serial = item.serial_number || '—';
      const status = item.status?.toLowerCase() || '';
      const qrValue = APP_SCHEME + item.id;

      // Statut badge
      let badgeClass = 'status-default';
      let badgeLabel = item.status || 'Inconnu';
      if (status === 'disponible')  { badgeClass = 'status-disponible';  badgeLabel = 'Disponible'; }
      else if (status === 'loué')   { badgeClass = 'status-loue';        badgeLabel = 'Loué'; }
      else if (status === 'maintenance') { badgeClass = 'status-maintenance'; badgeLabel = 'Maintenance'; }
      else if (status === 'endommagé' || status === 'endommage') { badgeClass = 'status-endommage'; badgeLabel = 'Endommagé'; }

      // Carte
      const card = document.createElement('div');
      card.className = 'qr-card';
      card.dataset.nom = nom.toLowerCase();
      card.dataset.serial = serial.toLowerCase();

      const wrapper = document.createElement('div');
      wrapper.className = 'qr-canvas-wrapper';
      card.appendChild(wrapper);

      card.innerHTML += `
        <div class="qr-info">
          <div class="qr-model">${escapeHtml(nom)}</div>
          <div class="qr-serial">${escapeHtml(serial)}</div>
          <span class="status-badge ${badgeClass}">${badgeLabel}</span>
        </div>
      `;

      grid.appendChild(card);

      // Génère le QR dans le wrapper
      new QRCode(wrapper, {
        text: qrValue,
        width: 140,
        height: 140,
        correctLevel: QRCode.CorrectLevel.M,
      });
    });
  }

  function filterCards() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = allItems.filter(item => {
      const nom = (item.model_materiel?.nom || '').toLowerCase();
      const serial = (item.serial_number || '').toLowerCase();
      return nom.includes(query) || serial.includes(query);
    });
    renderCards(filtered);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── AUTO-LOGIN si session existante ──
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      const { data: userRow } = await db
        .from('users')
        .select('member_ILIA')
        .eq('email', session.user.email)
        .maybeSingle();

      if (userRow?.member_ILIA) {
        showApp();
        return;
      }
      await db.auth.signOut();
    }
  })();
</script>
</body>
</html>
